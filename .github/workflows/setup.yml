name: Setup Yemen Door CRM

"on":
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone CRM-Order-fc source
        run: git clone --depth 1 https://github.com/Abok90/CRM-Order-fc.git /tmp/src

      - name: Build Yemen Door files
        run: |
          python3 - << 'PYEOF'
          import os, base64, json

          with open('/tmp/src/index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          # Supabase credentials
          html = html.replace(
              "https://tdprtlvogzfzfckpvkpa.supabase.co",
              "https://jkhojxxjjtclstwbhfne.supabase.co"
          ).replace(
              "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkcHJ0bHZvZ3pmemZja3B2a3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4OTUwMTcsImV4cCI6MjA4ODQ3MTAxN30.0TrcH65HQO5gboqsNfadSCGZQ95anY_0Bz97db5dPBg",
              "sb_publishable_QGFKYHwRBpaYeqvT4dbuTg_d5JzzlIk"
          )

          # Brand name
          html = html.replace('content="CRM Pro"', 'content="\u064a\u0645\u0646 \u062f\u0648\u0631"')
          html = html.replace("CRM Pro", "\u064a\u0645\u0646 \u062f\u0648\u0631")

          # Pages list - Yemen Door only
          html = html.replace(
              "const pages = ['\u0639\u0627\u064a\u062f\u0629', '\u0639\u0627\u064a\u062f\u0629 \u0648\u064a\u0628', '\u0627\u0648\u0641\u0631', '\u0627\u0648\u0641\u0631 \u0648\u064a\u0628', 'Elite EG'];",
              "const pages = ['\u064a\u0645\u0646 \u062f\u0648\u0631 \u0648\u064a\u0628'];"
          )

          # Hide factory accounts tab
          html = html.replace(
              "{isSuperAdmin && <button onClick={() => {setCurrentTab('factory'); setIsSidebarOpen(false);}}",
              "{false && <button onClick={() => {setCurrentTab('factory'); setIsSidebarOpen(false);}}"
          )

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          print("index.html OK")

          os.makedirs('api', exist_ok=True)

          files = {
              'api/shopify-webhook.js': '',
              'api/shopify-action.js': '',
              'sw.js': '',
              'speed-insights.js': '',
          }
          for path, b64 in files.items():
              os.makedirs(os.path.dirname(path) if os.path.dirname(path) else '.', exist_ok=True)
              with open(path, 'wb') as f:
                  f.write(base64.b64decode(b64))
              print(f"{path} OK")

          with open('vercel.json', 'w') as f:
              json.dump({"buildCommand": None, "outputDirectory": ".", "framework": None, "cleanUrls": False, "functions": {"api/*.js": {"maxDuration": 30}}}, f, indent=2)
          print("vercel.json OK")

          with open('manifest.json', 'w', encoding='utf-8') as f:
              json.dump({"name": "\u064a\u0645\u0646 \u062f\u0648\u0631 CRM", "short_name": "\u064a\u0645\u0646 \u062f\u0648\u0631", "start_url": "/", "display": "standalone", "background_color": "#0f172a", "theme_color": "#0f172a", "lang": "ar", "dir": "rtl", "icons": [{"src": "https://placehold.co/192x192/0f172a/ffffff?text=YD", "sizes": "192x192", "type": "image/png"}, {"src": "https://placehold.co/512x512/0f172a/ffffff?text=YD", "sizes": "512x512", "type": "image/png"}]}, f, ensure_ascii=False, indent=2)
          print("manifest.json OK")

          with open('package.json', 'w') as f:
              json.dump({"name": "crm-yemen-door", "version": "1.0.0", "description": "CRM Yemen Door", "private": True, "scripts": {"build": "echo 'No build step required'"}, "dependencies": {"@vercel/speed-insights": "^1.0.12"}}, f, indent=2)
          print("package.json OK")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Yemen Door CRM - branding, pages, remove factory tab"
          git push
